name: Autograding Tests
'on':
  - push
  - repository_dispatch
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Run Candidate Setup
      run: |
        if [ -f "setup.sh" ]; then
          chmod +x setup.sh
          ./setup.sh
        fi
    - name: Ensure Scripts are executable
      run: chmod +x cli.sh test.sh grader/grade.sh || true
    - name: Run Autograder
      id: autograder
      run: |
        if ./test.sh; then
          echo "passed=true" >> $GITHUB_OUTPUT
        else
          echo "passed=false" >> $GITHUB_OUTPUT
          exit 1
        fi
      continue-on-error: true
    